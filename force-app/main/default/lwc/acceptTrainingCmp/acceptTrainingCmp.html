<template>
    <div lwc:if={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-align_absolute-center">
            <div lwc:if={isLoading}>
                <div class="slds-backdrop slds-backdrop_open"> </div>
                <lightning-spinner alternative-text={labels.Loading} size="large"></lightning-spinner>
            </div>
            <div class="slds-modal__container">
                <div class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title={labels.Close} onclick={closeModal} disabled={isLoading}>
                        <lightning-icon icon-name="utility:close" alternative-text={labels.Close}
                            size="small"></lightning-icon>
                        <span class="slds-assistive-text">{labels.closeLabel}</span>
                    </button>
                    <h2 class="slds-text-heading_medium">{labels.confirmAcceptTraining}</h2>
                </div>
                <div class="slds-modal__content slds-var-p-around_medium slds-text-align_center">
                    <p>{labels.acceptTrainingConfirmation}</p>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button variant="neutral" label={labels.No} onclick={closeModal}
                        class="slds-var-m-right_x-small" disabled={isLoading}>
                    </lightning-button>
                    <lightning-button variant="brand" label={labels.Yes} onclick={handleAccept} disabled={isLoading}>
                    </lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </div>
</template>
