                    <lightning-button class="slds-col " label={labels.Save_As_Draft} variant="neutral"
                        onclick={handleSaveAsDraft}></lightning-button>
                    <lightning-button class="slds-col " label={labels.Next} variant="success" lwc:if={showNextButton}
                        onclick={handleNext}></lightning-button>
                </div>
            </div>
        </div>
    </div>
    <div lwc:else> <!-- Form 2 -->
        <div>
            <c-files-related-list-cmp record-id={reimbursementId}></c-files-related-list-cmp>
        </div>
        <div class="custom_btn margin-top-20">
            <div class="slds-grid slds-grid_align-end slds-gutters">
                <lightning-button class="slds-col" label={labels.Save_As_Draft} variant="neutral"
                    onclick={handleSaveAsDraft}></lightning-button>
                <lightning-button class="slds-col" label={labels.Submit_For_Approval} variant="success"
                    onclick={handleSubmit}></lightning-button>
            </div>
        </div>
    </div>
</template>
