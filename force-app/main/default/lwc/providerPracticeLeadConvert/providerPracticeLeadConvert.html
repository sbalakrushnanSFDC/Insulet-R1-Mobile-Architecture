<template>
    <div class="slds-box slds-theme_default slds-p-around_medium slds-radius_medium slds-shadow_small slds-is-relative">
        <!-- Spinner -->
        <template if:true={isLoading}>
            <div
                class="slds-backdrop slds-backdrop_open slds-is-absolute slds-grid slds-grid_align-center slds-grid_vertical-align-center">
                <!-- Loading spinner or message -->
                <lightning-spinner size="medium"></lightning-spinner>
            </div>
        </template>
        <lightning-modal-header label="Lead Conversion Summary"></lightning-modal-header>
        <lightning-modal-body class="slds-is-relative">
            <!-- Error Messages (Show only if validation fails) -->
            <template if:true={hasErrors}>
                <div class="slds-m-bottom_medium" role="alert">
                    <div class="slds-section slds-is-open">
                        <h3 class="slds-section__title slds-theme_shade">
                            <span class="slds-truncate slds-p-left_small"
                                title={lceHeader}>{lceHeader}</span>
                        </h3>
                        <div class="slds-section__content slds-p-around_medium">
                            <div class="slds-text-align_left">
                                <template for:each={errorMessages} for:item="error">
                                    <p key={error} class="slds-text-body_regular slds-m-bottom_xx-small">
                                        {error}
                                    </p>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <!-- Dynamic Account Details -->
            <template if:true={showAccountDetails}>
                <div class="slds-grid slds-wrap slds-p-around_medium slds-gutters">
                    <template for:each={accountsList} for:item="rec">
                        <div key={rec.keyLabel} class="slds-col slds-size_1-of-2">
                            <lightning-icon icon-name="standard:account" size="small" alternative-text={rec.keyLabel}>
                            </lightning-icon>
                            <p class="slds-text-title_caps slds-p-top_x-small">
                                {rec.keyLabel}
                            </p>
                            <p class="slds-text-heading_small">
                                <a href={rec.url} target="_blank">{rec.name}</a>
                            </p>
                        </div>
                    </template>
                </div>
            </template>
        </lightning-modal-body>
    </div>
</template>
